name: Windows build

# Builds sudokah on real Windows runners (native x86_64-pc-windows-msvc, the
# same target we ship), does a best-effort smoke launch, then packages the exe
# into an .msi installer with cargo-wix and uploads it. On a version tag the
# installer is attached to the matching GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed for the release upload on tag builds
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # cargo-wix drives the WiX Toolset v3 (candle/light). We can't use
      # `choco install wixtoolset`: that package depends on .NET Framework 3.5,
      # whose sub-install fails on the runner image. Instead grab the WiX v3.14
      # binaries zip directly — candle/light run on .NET 4.x (already present),
      # so the 3.5 bootstrapper check never fires. cargo-wix locates the tools
      # via the `WIX` env var (it appends `bin`), so extract into a `bin`
      # subfolder, point `WIX` at its parent, and also add `bin` to PATH.
      - name: Install WiX Toolset v3
        shell: pwsh
        run: |
          $url = "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip"
          $bin = "$env:RUNNER_TEMP\wix\bin"
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\wix.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\wix.zip" -DestinationPath $bin -Force
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Add-Content -Path $env:GITHUB_ENV  -Value "WIX=$env:RUNNER_TEMP\wix\"

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      # Native build on the runner's host target (x86_64-pc-windows-msvc), using
      # the release profile from Cargo.toml. This is the real-Windows compile/link
      # test; it produces target/release/sudokah.exe.
      - name: Build (release)
        run: cargo build --release

      # Best-effort: launch the GUI exe and confirm it doesn't crash on startup.
      # Marked continue-on-error because the runners may lack an OpenGL 3.x context
      # for the glow renderer, which can make windowed startup fail even when the
      # build is fine. The installer below is the reliable deliverable.
      - name: Smoke-launch
        continue-on-error: true
        shell: pwsh
        run: |
          $p = Start-Process -FilePath target\release\sudokah.exe -PassThru
          Start-Sleep -Seconds 8
          if ($p.HasExited) {
            Write-Error "sudokah.exe exited early (code $($p.ExitCode))"
            exit 1
          }
          Write-Host "Still running after 8s - startup OK"
          Stop-Process -Id $p.Id -Force

      # Package the already-built release exe into an installer. `--no-build`
      # reuses the binary from the release step above; the .msi lands in
      # target/wix/ named sudokah-<version>-x86_64.msi.
      - name: Build MSI installer
        run: cargo wix --no-build --nocapture

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: sudokah-windows-x86_64-msi
          path: target/wix/*.msi
          if-no-files-found: error

      # On a version tag (e.g. `git tag v0.1.0 && git push --tags`), attach the
      # installer to the matching GitHub Release (created if it doesn't exist yet).
      - name: Attach MSI to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/wix/*.msi
          fail_on_unmatched_files: true

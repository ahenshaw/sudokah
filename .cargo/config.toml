# Cross-compiling to Windows from Linux.
#
#   rustup target add x86_64-pc-windows-gnu   # one-time
#   sudo apt install gcc-mingw-w64-x86-64     # one-time (provides the linker)
#   cargo build --release --target x86_64-pc-windows-gnu
#
# Produces target/x86_64-pc-windows-gnu/release/sudokah.exe. The GNU (mingw)
# target is used rather than MSVC so no Windows SDK / cargo-xwin is required.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
ar = "x86_64-w64-mingw32-ar"
